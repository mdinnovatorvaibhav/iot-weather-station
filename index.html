<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Oasis Public School Weather</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b1d3a;
      color: white;
      text-align: center;
    }

    /* ===== HEADER ===== */
    .header {
      background: #07142b;
      padding: 15px;
      font-size: 28px;
      font-weight: bold;
      color: #d4af37;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
    }

    .header img {
      height: 70px;
      width: auto;
    }

    .sub {
      color: #b0c4de;
      margin-bottom: 20px;
    }

    /* ===== CARDS ===== */
    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 10px;
    }

    .card {
      background: #102a54;
      border: 2px solid #d4af37;
      margin: 10px;
      padding: 20px;
      width: 200px;
      border-radius: 15px;
      box-shadow: 0 0 15px rgba(212,175,55,0.3);
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
      box-shadow: 0 0 25px #d4af37;
    }

    .label {
      color: #d4af37;
      font-weight: bold;
    }

    .value {
      font-size: 22px;
      margin-top: 10px;
    }

    /* ===== FOOTER ===== */
    .footer {
      margin-top: 25px;
      padding: 20px;
      font-size: 13px;
      color: #aaa;
      background: #07142b;
    }

    .logos {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .logos img {
      height: 60px;
      width: auto;
      background: white;
      padding: 5px;
      border-radius: 10px;
    }

    .credit {
      margin-top: 10px;
      font-size: 12px;
      color: #d4af37;
    }

    /* =========================
       📱 MOBILE DEFAULT (NO CHANGE)
       ========================= */


    /* =========================
       💻 PC FIX (IMPORTANT PART)
       ========================= */
    @media (min-width: 768px) {

      body {
        display: flex;
        flex-direction: column;
        justify-content: center;   /* pushes content down nicely */
        min-height: 100vh;
      }

      .sub {
        margin-bottom: 40px;
      }

      .container {
        margin-top: 20px;
      }

      .footer {
        margin-top: auto;
      }
    }

  </style>
</head>

<body>

  <!-- ===== HEADER ===== -->
  <div class="header">
    <img src="logo.png" alt="School Logo">
  The Oasis Public School
  </div>

  <div class="sub">🌦 Live Weather Dashboard</div>

  <!-- ===== CARDS ===== -->
  <div class="container">

    <div class="card">
      <div class="label">🌡 Temperature</div>
      <div class="value" id="temp">--</div>
    </div>

    <div class="card">
      <div class="label">💧 Humidity</div>
      <div class="value" id="hum">--</div>
    </div>

    <div class="card">
      <div class="label">☀ Light</div>
      <div class="value" id="light">--</div>
    </div>

    <div class="card">
      <div class="label">🌧 Rain</div>
      <div class="value" id="rain">--</div>
    </div>

  </div>

  <!-- ===== FOOTER ===== -->
  <div class="footer">

    <div>IoT Weather System</div>

    <div class="logos">
      <img src="mdinnovator.png" alt="MDInnovator Logo">
    </div>

    <div class="credit">Designed & Developed by MDInnovator</div>

  </div>

<script>

const channelID = "3390105";

function updateData() {

  fetch(`https://api.thingspeak.com/channels/${channelID}/feeds.json?results=1`)
  .then(response => response.json())
  .then(data => {

    if (!data.feeds || data.feeds.length === 0) return;

    let feed = data.feeds[0];

    let temp = parseFloat(feed.field1).toFixed(2);
    let hum = parseFloat(feed.field2).toFixed(2);

    document.getElementById("temp").innerText =
      isNaN(temp) ? "--" : temp + " °C";

    document.getElementById("hum").innerText =
      isNaN(hum) ? "--" : hum + " %";

    document.getElementById("light").innerText =
      (feed.field3 == "1") ? "Day ☀" : "Night 🌙";

    document.getElementById("rain").innerText =
      (feed.field4 == "1") ? "Rain 🌧" : "No Rain ☁";

  })
  .catch(err => console.log("Error:", err));

}

setInterval(updateData, 5000);
updateData();

</script>

</body>
</html>
